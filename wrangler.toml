name = "tco-compare"
main = "worker/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: Replace the placeholder zone_id values below with the real
# Cloudflare zone IDs before the first deploy. The Worker reads
# `dist/widget/` via the per-environment ASSETS binding.

[env.staging]
name = "tco-compare-staging"
routes = [{ pattern = "tco-staging.minipclab.com", zone_id = "" }]

[env.production]
name = "tco-compare"
routes = [{ pattern = "tco.minipclab.com", zone_id = "" }]

[[env.staging.assets]]
directory = "dist/widget"
binding = "ASSETS"

[[env.production.assets]]
directory = "dist/widget"
binding = "ASSETS"
