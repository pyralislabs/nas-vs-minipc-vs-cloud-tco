name: Release

# Trusted-publishing OIDC trust:
#   Subject:  repo:<owner>/<repo>:ref:refs/tags/v*
#   Audience: npm:nas-vs-minipc-vs-cloud-tco
# Configure the OIDC trust against the production npm organization once,
# before the first release. Do not commit long-lived NPM_TOKEN secrets;
# the workflow below relies on id-token: write and provenance, not tokens.

on:
  push:
    branches: [main]
    paths: [".changeset/**"]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository_owner == 'anomalyco'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
