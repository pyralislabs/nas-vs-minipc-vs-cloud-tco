version: 2
updates:
  # The `npm` ecosystem here really means "use pnpm against pnpm-lock.yaml"
  # because the repo's packageManager field pins pnpm@10.8.0. Dependabot's pnpm
  # runs inside its Docker image are configured with a fallback registry of
  # `https://npm.pkg.github.com`, which only mirrors stale DefinitelyTyped
  # releases (capped at @types/node@17.0.18). The repo's `.npmrc` pins the
  # registry to `https://registry.npmjs.org/` so peer-dependency resolution
  # (e.g. jsdom → @types/node) finds the latest @types/node there.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "vitest"
          - "vite"
          - "wrangler"
      runtime:
        patterns:
          - "decimal.js"
          - "ajv"
          - "commander"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
