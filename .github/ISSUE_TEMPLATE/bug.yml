name: Bug Report
description: Report a calculation, CLI, widget, or packaging defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. **Do not** file
        security vulnerabilities here—use SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Paste the exact command, input JSON (trimmed), and output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `tco-compare --version` or npm package version.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Library
        - CLI
        - Widget
        - Packaging/docs
    validations:
      required: true
